apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wallet-labeler
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wallet-labeler
subjects:
  - kind: ServiceAccount
    name: wallet-labeler
    namespace: {{ .Values.namespace }}
roleRef:
  kind: ClusterRole
  name: wallet-labeler
  apiGroup: rbac.authorization.k8s.io
